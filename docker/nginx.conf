# Optional reverse-proxy / CDN edge notes for NewsPortal frontend.
#
# Typical topology:
#   Cloudflare (CDN + WAF) → Origin (Vercel OR nginx → Next.js container)
#   Media / uploads often cached at Cloudflare from WordPress origin.
#
# This file is a reference nginx config when self-hosting Next.js behind nginx.
# It is NOT required for Vercel deployments.

upstream nextjs_upstream {
    server frontend:3000;
    keepalive 32;
}

# Map Cloudflare / proxy client IP
map $http_cf_connecting_ip $client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

server {
    listen 80;
    server_name news.example.com;

    # Redirect to HTTPS when terminating TLS at nginx (skip if Cloudflare Flexible)
    # return 301 https://$host$request_uri;

    client_max_body_size 8m;

    # Security headers (Cloudflare can also inject these)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------------------------
    # CDN / cache guidance (Cloudflare Page Rules or Cache Rules)
    # ---------------------------------------------------------------------------
    # Cache aggressively:
    #   /_next/static/*     — immutable hashed assets (1 year)
    #   /_next/image*       — CDN image optimizer output
    #   /favicon.ico, /logo.svg
    #
    # Cache short / bypass:
    #   /api/*              — preview, revalidate, search
    #   HTML documents      — rely on Next.js ISR + Cache-Control from origin
    #   /graphql (WP)       — usually bypass; cache at Next.js Smart Cache layer
    #
    # Cloudflare:
    #   - Enable Brotli / HTTP/3
    #   - Polish / Image Resizing optional if not using next/image + CDN_URL
    #   - Cache Everything only for static paths; avoid caching personalized HTML
    #   - Purge on WP publish via webhook → /api/revalidate

    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    }

    location /api/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "no-store";
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_read_timeout 60s;
    }
}

